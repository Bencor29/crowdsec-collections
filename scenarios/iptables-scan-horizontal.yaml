type: leaky
name: bencor29/iptables-scan-horizontal
description: "Detect early horizontal portscans"
filter: "evt.Meta.log_type == 'iptables_drop' && evt.Meta.service == 'tcp'"
groupby: evt.Meta.source_ip
distinct: evt.Parsed.dst_ip
capacity: 5
leakspeed: 1m
blackhole: 1m
labels:
  remediation: true
  classification:
    - attack.T1595.001
    - attack.T1018
    - attack.T1046
  behavior: "tcp:scan"
  label: "TCP Port Scan"
  spoofable: 3
  confidence: 1
